# Paste inside the existing server {} in the site's nginx.conf,
# ABOVE the catch-all "location /". Requires (once, in the http {} block):
#   upstream game_backend { server game:7788; }
#
# The trailing slash on proxy_pass strips the /play prefix, so the game
# server sees /, /api/..., /ws — same paths as standalone.

        # Ibokki game (client + API + websocket)
        location /play/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://game_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Game websocket sits on this path too — long timeouts.
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 60;
        }

        location = /play {
            return 301 /play/;
        }
