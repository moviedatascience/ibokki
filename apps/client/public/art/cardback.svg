<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 640">
  <!-- Card back master (460x640, 5:7): the Invocation of Ibokki — Eye, Bow, Key —
       as engraved medallions in the ritual-circle geometry. Gold-leaf line on
       leather-brown field (style bible §10). Simplified 92x128 variant: cardback-small.svg -->
  <defs>
    <symbol id="cb-eye" viewBox="0 0 100 100">
      <path fill-rule="evenodd" d="M 4.0 48.6 C 19.0 33.4, 41.0 27.2, 58.0 29.4 C 74.0 31.5, 88.0 38.8, 96.2 48.2 C 82.6 66.4, 56.6 72.6, 38.0 68.4 C 23.6 65.2, 11.4 58.4, 4.0 48.6 Z M 17.6 48.8 C 29.4 39.6, 47.0 36.4, 59.6 38.6 C 69.8 40.4, 78.2 44.0, 84.4 48.4 C 72.4 60.8, 51.8 64.4, 39.4 61.2 C 30.0 58.8, 22.8 54.4, 17.6 48.8 Z"/>
      <path fill-rule="evenodd" d="M 51.0 33.0 C 60.4 33.4, 67.2 40.4, 66.8 49.0 C 66.4 57.6, 58.8 64.0, 49.8 63.6 C 40.8 63.2, 34.0 56.2, 34.4 47.6 C 34.8 39.2, 41.8 32.6, 51.0 33.0 Z M 44.6 40.0 C 41.8 40.2, 40.0 42.4, 40.2 45.0 C 40.4 47.6, 42.8 49.4, 45.4 49.2 C 48.0 49.0, 49.8 46.8, 49.6 44.2 C 49.4 41.6, 47.4 39.8, 44.6 40.0 Z"/>
      <path d="M 27.0 70.0 L 22.6 80.4 L 27.8 81.6 L 31.6 71.4 Z"/>
      <path d="M 47.0 73.0 L 45.6 84.0 L 51.0 84.2 L 52.0 73.4 Z"/>
      <path d="M 66.4 70.6 L 70.6 80.6 L 65.6 82.0 L 62.0 71.6 Z"/>
      <path d="M 30.4 27.0 L 26.8 18.0 L 31.8 16.6 L 35.0 26.0 Z"/>
      <path d="M 60.0 25.6 L 62.8 16.2 L 67.6 17.8 L 64.6 27.0 Z"/>
    </symbol>
    <symbol id="cb-bow" viewBox="0 0 100 100">
      <path d="M 55.0 5.0 C 27.0 16.0, 11.0 32.0, 11.4 50.6 C 11.8 69.2, 28.2 85.2, 56.0 95.4 L 50.0 81.0 C 33.4 72.6, 26.0 62.4, 25.8 50.2 C 25.6 38.0, 32.8 27.4, 48.6 19.0 Z"/>
      <path d="M 55.0 5.0 C 63.0 1.6, 69.4 7.4, 65.4 14.0 C 66.0 8.6, 61.2 6.0, 55.0 5.0 Z"/>
      <path d="M 56.0 95.4 C 64.2 98.6, 70.6 92.6, 66.4 86.2 C 67.0 91.4, 62.2 94.2, 56.0 95.4 Z"/>
      <path d="M 8.6 41.6 L 29.0 40.0 L 29.6 44.8 L 9.2 46.4 Z"/>
      <path d="M 8.8 55.2 L 29.2 56.6 L 28.8 61.4 L 8.4 60.0 Z"/>
      <path d="M 58.2 9.0 L 64.4 8.8 L 65.4 91.0 L 59.2 91.2 Z"/>
    </symbol>
    <symbol id="cb-key" viewBox="0 0 100 100">
      <path fill-rule="evenodd" d="M 8.0 36.6 L 31.0 28.8 L 31.4 71.4 L 8.4 63.2 Z M 14.2 41.6 L 25.0 37.4 L 25.3 62.4 L 14.5 58.4 Z"/>
      <path d="M 30.6 44.8 L 91.0 45.4 C 94.2 47.8, 94.0 51.4, 90.6 54.2 L 30.4 53.6 Z"/>
      <path d="M 36.6 39.8 L 43.4 40.0 L 43.2 59.2 L 36.4 59.0 Z"/>
      <path d="M 72.8 53.7 L 73.2 70.4 L 81.4 70.6 L 81.0 53.8 Z"/>
      <path d="M 84.6 53.9 L 84.9 64.8 L 91.8 65.0 L 91.5 54.0 Z"/>
    </symbol>
  </defs>

  <!-- leather field -->
  <rect width="460" height="640" fill="#2f2721"/>
  <rect width="460" height="640" fill="none" stroke="#1f1913" stroke-width="6"/>

  <!-- double rules -->
  <rect x="14" y="14" width="432" height="612" fill="none" stroke="#c99a3f" stroke-width="3"/>
  <rect x="24" y="24" width="412" height="592" fill="none" stroke="#6e5a33" stroke-width="1.4"/>

  <!-- quiet corner diamonds -->
  <g fill="#c99a3f">
    <path d="M 24 16.5 L 31.5 24 L 24 31.5 L 16.5 24 Z"/>
    <path d="M 436 16.5 L 443.5 24 L 436 31.5 L 428.5 24 Z"/>
    <path d="M 24 608.5 L 31.5 616 L 24 623.5 L 16.5 616 Z"/>
    <path d="M 436 608.5 L 443.5 616 L 436 623.5 L 428.5 616 Z"/>
  </g>

  <!-- ritual circle -->
  <g fill="none">
    <circle cx="230" cy="320" r="168" stroke="#c99a3f" stroke-width="2.6"/>
    <circle cx="230" cy="320" r="156" stroke="#6e5a33" stroke-width="1.1"/>
    <circle cx="230" cy="320" r="118" stroke="#6e5a33" stroke-width="1.1" stroke-dasharray="2.5 7"/>
  </g>
  <!-- compass ticks on the main ring -->
  <g stroke="#c99a3f" stroke-width="2.6">
    <line x1="230" y1="144" x2="230" y2="160"/>
    <line x1="230" y1="480" x2="230" y2="496"/>
    <line x1="54" y1="320" x2="70" y2="320"/>
    <line x1="390" y1="320" x2="406" y2="320"/>
  </g>

  <!-- three sigil medallions: Eye above, Bow lower-left, Key lower-right -->
  <g>
    <circle cx="230" cy="240" r="54" fill="#282018" stroke="#c99a3f" stroke-width="2"/>
    <circle cx="230" cy="240" r="47" fill="none" stroke="#6e5a33" stroke-width="0.9"/>
    <use href="#cb-eye" x="197" y="207" width="66" height="66" fill="#c99a3f"/>

    <circle cx="152" cy="388" r="54" fill="#282018" stroke="#c99a3f" stroke-width="2"/>
    <circle cx="152" cy="388" r="47" fill="none" stroke="#6e5a33" stroke-width="0.9"/>
    <use href="#cb-bow" x="119" y="355" width="66" height="66" fill="#c99a3f"/>

    <circle cx="308" cy="388" r="54" fill="#282018" stroke="#c99a3f" stroke-width="2"/>
    <circle cx="308" cy="388" r="47" fill="none" stroke="#6e5a33" stroke-width="0.9"/>
    <use href="#cb-key" x="275" y="355" width="66" height="66" fill="#c99a3f"/>
  </g>

  <!-- center of the triangle: a small still point -->
  <g fill="#c99a3f">
    <circle cx="230" cy="342" r="5"/>
    <path d="M 230 326 L 232.4 336 L 230 338.5 L 227.6 336 Z"/>
    <path d="M 230 358 L 232.4 348 L 230 345.5 L 227.6 348 Z"/>
    <path d="M 214 342 L 224 344.4 L 226.5 342 L 224 339.6 Z"/>
    <path d="M 246 342 L 236 344.4 L 233.5 342 L 236 339.6 Z"/>
  </g>
</svg>
